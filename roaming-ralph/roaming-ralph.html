<!doctype html>
<html lang="en-us">
<head>
<meta charset="utf-8">
<title>Roaming Ralph</title>

<link rel="stylesheet" href="//fonts.googleapis.com/css?family=Roboto">
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.6.1/css/font-awesome.min.css">

<style>
body {
  background: #181818;
  font-family: Roboto, sans-serif;
  color: #eee;
  margin: 0;
  overflow: hidden;
}

/* ================= HEADER ================= */

#header {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 50px;
  background: #111;
  display: flex;
  align-items: center;
  padding: 0 20px;
  font-size: 14pt;
  z-index: 10;
}

#header .title {
  margin-right: auto;
}

#header button {
  margin-left: 10px;
  background: #39f;
  border: none;
  color: white;
  font-weight: bold;
  padding: 6px 14px;
  cursor: pointer;
}

#header button:hover {
  background: #4af;
}

/* ================= MAIN SPLIT LAYOUT ================= */

#main {
  position: absolute;
  top: 50px;
  bottom: 30px;
  left: 0;
  right: 0;
  display: flex;
}

/* LEFT SIDE (Canvas) */

#canvas-container {
  flex: 1;
  background: black;
  display: flex;
  align-items: center;
  justify-content: center;
  border-right: 1px solid #333;
}

#canvas {
  width: 100%;
  height: 100%;
}

/* RIGHT SIDE (Console) */

#console-container {
  width: 40%;
  background: #111;
  display: flex;
  flex-direction: column;
}

#console-header {
  padding: 8px;
  background: #222;
  font-size: 10pt;
  border-bottom: 1px solid #333;
}

#output {
  flex: 1;
  background: black;
  color: #0f0;
  font-family: monospace;
  padding: 10px;
  overflow-y: auto;
  white-space: pre-wrap;
}

/* ================= FOOTER ================= */

#footer {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 30px;
  background: #111;
  padding: 5px 15px;
  font-size: 10pt;
}

/* Hide console in fullscreen */
body.fullscreen #console-container {
  display: none;
}
</style>
</head>

<body>

<div id="header">
  <div class="title">
    <i class="fa fa-gamepad"></i> Roaming Ralph (WebAssembly Build)
  </div>

  <button onclick="goBack()">
    <i class="fa fa-arrow-left"></i> Back
  </button>

  <button onclick="enterFullscreen()">
    <i class="fa fa-expand"></i> Fullscreen
  </button>
</div>

<div id="main">
  <div id="canvas-container">
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
  </div>

  <div id="console-container">
    <div id="console-header">
      Console Output
    </div>
    <div id="output"></div>
  </div>
</div>

<div id="footer">
  Powered by Panda3D + Emscripten + WebAssembly
</div>

<script>
var statusElement,
    Module = {
      preRun: [],
      postRun: [],
      print: (function() {
        var element = document.getElementById('output');
        return function(text) {
          console.log(text);
          if (element) {
            element.innerHTML += text + "\n";
            element.scrollTop = element.scrollHeight;
          }
        };
      })(),
      printErr: function(text) {
        console.error(text);
        Module.print(text);
      },
      canvas: (function() {
        var canvas = document.getElementById('canvas');
        canvas.addEventListener('mouseenter', function() {
          canvas.focus();
        });
        return canvas;
      })()
    };

/* ================= FULLSCREEN ================= */

function enterFullscreen() {
  if (Module.requestFullscreen) {
    Module.requestFullscreen(true, true); // pointer lock + resize
  }
}

document.addEventListener("fullscreenchange", function() {
  if (document.fullscreenElement) {
    document.body.classList.add("fullscreen");
  } else {
    document.body.classList.remove("fullscreen");
  }
});

/* ================= BACK BUTTON ================= */

function goBack() {
  window.location.href = "../index.html";
}
</script>

<script async src="roaming-ralph.js"></script>

</body>
</html>
