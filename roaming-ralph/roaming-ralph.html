<!doctype html>
<html lang="en-us">
<head>
<meta charset="utf-8">
<title>Roaming Ralph</title>

<link rel="stylesheet" href="//fonts.googleapis.com/css?family=Roboto">
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.6.1/css/font-awesome.min.css">

<style>
body {
  background: #181818;
  font-family: Roboto, sans-serif;
  color: #eee;
  margin: 0;
  overflow: hidden;
}

/* Top Header */
#header {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 50px;
  background-color: #111;
  display: flex;
  align-items: center;
  padding: 0 20px;
  font-size: 14pt;
}

#header button {
  margin-left: auto;
  background-color: #39f;
  border: none;
  color: white;
  font-weight: bold;
  padding: 6px 14px;
  font-family: Roboto, sans-serif;
}

#header button:hover {
  background-color: #4af;
  cursor: pointer;
}

/* Main Layout */
#main {
  position: absolute;
  top: 50px;
  bottom: 30px;
  left: 0;
  right: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

#canvas-container {
  border: 1px solid #333;
  background: black;
}

/* Loading UI */
#loader {
  position: absolute;
  top: 70px;
  left: 20px;
  font-size: 10pt;
}

.spinner {
  height: 20px;
  width: 20px;
  display: inline-block;
  vertical-align: middle;
  animation: rotation .8s linear infinite;
  border-left: 3px solid #555;
  border-right: 3px solid #555;
  border-bottom: 3px solid #555;
  border-top: 3px solid #39f;
  border-radius: 100%;
  margin-right: 10px;
}

@keyframes rotation {
  from { transform: rotate(0) }
  to { transform: rotate(360deg) }
}

#progress {
  width: 200px;
  height: 8px;
}

/* Footer */
#footer {
  height: 30px;
  background-color: #111;
  padding: 5px 15px;
  font-size: 10pt;
}

a { color: #eee; text-decoration: none; }
a:hover { text-decoration: underline; }
</style>
</head>

<body>

<div id="header">
  <i class="fa fa-gamepad"></i>&nbsp;&nbsp;
  Roaming Ralph (WebAssembly Build)
  <button onclick="location.href='../index.html'">
    <i class="fa fa-arrow-left"></i> Back
  </button>
</div>

<div id="loader">
  <div class="spinner" id="spinner"></div>
  <span id="status">Downloading...</span>
  <br>
  <progress hidden id="progress" max="100" value="0"></progress>
</div>

<div id="main">
  <div id="canvas-container">
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
  </div>
</div>

<div id="footer">
  Powered by Panda3D + Emscripten + WebAssembly
</div>

<script>
var statusElement = document.getElementById("status"),
    progressElement = document.getElementById("progress"),
    spinnerElement = document.getElementById("spinner");

var Module = {
  preRun: [],
  postRun: [],
  canvas: (function() {
    var canvas = document.getElementById('canvas');
    canvas.addEventListener('mouseenter', function() { canvas.focus(); }, false);
    return canvas;
  })(),
  setStatus: function(text) {
    var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
    if (m) {
      progressElement.hidden = false;
      spinnerElement.style.display = "inline-block";
      progressElement.value = 100 * parseInt(m[2]);
      progressElement.max = 100 * parseInt(m[4]);
      statusElement.innerHTML = m[1];
    } else {
      progressElement.hidden = true;
      if (!text) spinnerElement.style.display = "none";
      statusElement.innerHTML = text;
    }
  },
  monitorRunDependencies: function(left) {
    this.totalDependencies = Math.max(this.totalDependencies || 0, left);
    Module.setStatus(left ?
      "Preparing... (" + (this.totalDependencies - left) + "/" + this.totalDependencies + ")" :
      "All downloads complete.");
  }
};

Module.setStatus("Downloading...");
</script>

<script async src="roaming-ralph.js"></script>

</body>
</html>
