<!DOCTYPE html>
<html>
<head>
  <title>Panda3D WebGL Demos</title>
  <link rel="stylesheet" href="//fonts.googleapis.com/css?family=Roboto">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.6.1/css/font-awesome.min.css">

  <style>
    body {
      background: #181818;
      font-family: Roboto, sans-serif;
      color: #eee;
      margin: 0;
      overflow: hidden;
    }

    #header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 50px;
      background-color: #111;
      display: flex;
      align-items: center;
      padding: 0 20px;
      font-size: 14pt;
    }

    #main {
      position: absolute;
      top: 50px;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 60px;
    }

    .card {
      background: #222;
      border: 1px solid #333;
      width: 320px;
      padding: 40px;
      text-align: center;
      transition: 0.2s ease;
    }

    .card:hover {
      background: #252525;
      border-color: #39f;
    }

    .card h2 {
      margin-top: 0;
      font-weight: normal;
    }

    button {
      width: 200px;
      background-color: #39f;
      border: none;
      font-weight: bold;
      color: white;
      padding: 10px;
      margin-top: 20px;
      font-family: Roboto, sans-serif;
      font-size: 11pt;
    }

    button:hover {
      background-color: #4af;
      cursor: pointer;
    }

    #credits {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 30px;
      background-color: #111;
      text-align: left;
      padding: 5px 15px;
      font-size: 10pt;
    }

    a {
      color: #eee;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

<div id="header">
  <i class="fa fa-cube"></i>&nbsp;&nbsp;
  Panda3D WebGL Demo Launcher
</div>

<div id="main">

  <div class="card">
    <h2><i class="fa fa-code"></i> Live Editor</h2>
    <p>Interactive Panda3D Python editor running in WebAssembly.</p>
    <button onclick="location.href='editor/editor.html'">
      <i class="fa fa-play"></i> Launch Editor
    </button>
  </div>

  <div class="card">
    <h2><i class="fa fa-gamepad"></i> Roaming Ralph</h2>
    <p>Classic Panda3D demo compiled for the browser.</p>
    <button onclick="location.href='roaming-ralph/roaming-ralph.html'">
      <i class="fa fa-play"></i> Launch Demo
    </button>
  </div>

</div>

<div id="credits">
  Powered by 
  <a href="https://www.panda3d.org/" target="_blank">Panda3D</a>, 
  <a href="https://emscripten.org/" target="_blank">Emscripten</a> 
  and WebAssembly
</div>

</body>
</html>
