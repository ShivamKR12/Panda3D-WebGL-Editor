<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panda3D WebGL Demos</title>

  <link rel="stylesheet" href="//fonts.googleapis.com/css?family=Roboto">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.6.1/css/font-awesome.min.css">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      background: #181818;
      font-family: Roboto, sans-serif;
      color: #eee;
      margin: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* HEADER */
    #header {
      background-color: #111;
      padding: 15px 20px;
      font-size: 16pt;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    /* MAIN AREA */
    #main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 40px;
      padding: 40px 20px;
      flex-wrap: wrap; /* KEY for mobile */
    }

    /* CARD */
    .card {
      background: #222;
      border: 1px solid #333;
      width: 320px;
      max-width: 100%;
      padding: 40px;
      text-align: center;
      transition: 0.2s ease;
      border-radius: 8px;
    }

    .card:hover {
      background: #252525;
      border-color: #39f;
    }

    .card h2 {
      margin-top: 0;
      font-weight: normal;
    }

    /* BUTTON */
    button {
      width: 100%;
      max-width: 220px;
      background-color: #39f;
      border: none;
      font-weight: bold;
      color: white;
      padding: 12px;
      margin-top: 20px;
      font-family: Roboto, sans-serif;
      font-size: 11pt;
      border-radius: 4px;
      transition: 0.2s ease;
    }

    button:hover {
      background-color: #4af;
      cursor: pointer;
    }

    /* FOOTER */
    #credits {
      background-color: #111;
      padding: 10px 15px;
      font-size: 10pt;
      flex-shrink: 0;
    }

    a {
      color: #eee;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    /* MOBILE ADJUSTMENTS */
    @media (max-width: 768px) {
      #main {
        flex-direction: column;
        align-items: stretch;
        padding: 30px 15px;
      }

      .card {
        width: 100%;
        padding: 30px 20px;
      }

      #header {
        font-size: 14pt;
      }
    }
  </style>
</head>

<body>

<div id="header">
  <i class="fa fa-cube"></i>&nbsp;&nbsp;
  Panda3D WebGL Demo Launcher
</div>

<div id="main">

  <div class="card">
    <h2><i class="fa fa-code"></i> Live Editor</h2>
    <p>Interactive Panda3D Python editor running in WebAssembly.</p>
    <button onclick="location.href='editor/editor.html'">
      <i class="fa fa-play"></i> Launch Editor
    </button>
  </div>

  <div class="card">
    <h2><i class="fa fa-gamepad"></i> Roaming Ralph</h2>
    <p>Classic Panda3D demo compiled for the browser.</p>
    <button onclick="location.href='roaming-ralph/roaming-ralph.html'">
      <i class="fa fa-play"></i> Launch Demo
    </button>
  </div>

</div>

<div id="credits">
  Powered by 
  <a href="https://www.panda3d.org/" target="_blank">Panda3D</a>, 
  <a href="https://emscripten.org/" target="_blank">Emscripten</a> 
  and WebAssembly
</div>

</body>
</html>
